<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <match target="pattern" >
        <edit name="dpi" mode="assign" >
            <double>96</double>
        </edit>
    </match>
  	<match target="font" >
    		<edit name="rgba" mode="assign" >
            <const>rgb</const>
		    </edit>
  	</match>
    <alias>
    		<family>Segoe UI</family>
    		<family>Calibri</family>
    		<family>Candara</family>
    		<family>Corbel</family>
        <family>Microsoft YaHei</family>
		    <family>微软雅黑</family>
		    <family>Microsoft JhengHei</family>
		    <family>微軟正黑體</family>
        <family>Meiryo</family>
		    <family>Malgun Gothic</family>
	  </alias>
  	<alias>
    		<family>Cambria</family>
    		<family>Constantina</family>
    		<family>SimSunNew</family>
    		<family>宋体New</family>
    		<family>PMingLiUNew</family>
    		<family>新細明體New</family>
        <default>
      			<family>serif</family>
    		</default>
    </alias>
    <alias>
		    <family>Consolas</family>
        <family>Courier New</family>
        <default>
			      <family>monospace</family>
		    </default>
	  </alias>
    <alias>
        <family>sans-serif</family>
        <prefer>
      			<family>Segoe UI</family>
      			<family>Calibri</family>
      			<family>Candara</family>
      			<family>Corbel</family>
            <family>Microsoft YaHei</family>
            <family>微软雅黑</family>
      			<family>Microsoft JhengHei</family>
      			<family>微軟正黑體</family>
      			<family>Meiryo</family>
      			<family>Malgun Gothic</family>
            <family>NSimSunNew</family>
      			<family>宋体New</family>
      			<family>PMingLiUNew</family>
      			<family>新細明體New</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
      			<family>Cambria</family>
      			<family>Constantia</family>
            <family>Microsoft YaHei</family>
            <family>微软雅黑</family>
            <family>Microsoft JhengHei</family>
            <family>微軟正黑體</family>
      			<family>Meiryo</family>
      			<family>Malgun Gothic</family>
            <family>NSimSunNew</family>
            <family>宋体New</family>
            <family>PMingLiUNew</family>
            <family>新細明體New</family>
    		</prefer>
    </alias>
    <alias>
        <family>monospace</family>
		    <prefer>
			      <family>Consolas</family>
            <family>Microsoft YaHei</family>
            <family>微软雅黑</family>
            <family>Microsoft JhengHei</family>
            <family>微軟正黑體</family>
		        <family>Courier New</family>
      			<family>NSimSunNew</family>
      			<family>宋体New</family>
      			<family>PMingLiUNew</family>
      			<family>新細明體New</family>
    		</prefer>
    </alias>
  	<include ignore_missing="yes">./ms_vista_english.conf</include>
  	<include ignore_missing="yes">./ms_vista_cjk.conf</include>
    <match target="font" >
    		<test name="weight" compare="less_eq">
      			<const>medium</const>
    		</test>
        <test target="pattern" name="weight" compare="more">
            <const>medium</const>
        </test>
        <edit name="embolden" mode="assign" >
              <bool>true</bool>
        </edit>
    		<edit name="weight" mode="assign">
    		    <const>bold</const>
    		</edit>
    </match>
</fontconfig>